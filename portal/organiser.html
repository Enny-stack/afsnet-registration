<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Meetings Portal | Organiser Panel</title>
  <style>
    :root{
      --navy:#0B1F3A;
      --green:#0B5D3B;
      --gold:#C9A227;
      --bg:#F7F8FA;
      --card:#FFFFFF;
      --line:rgba(11,31,58,.12);
      --muted:#5E6A7A;
      --shadow:0 12px 28px rgba(11,31,58,.10);
      --radius:18px;
      --danger:#B42318;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--navy);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .hero,
    .section-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    h1,h2,h3{margin-top:0}
    .muted{color:var(--muted)}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:11px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--navy);
      text-decoration:none;
      font-weight:850;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--green),var(--navy));
      color:#fff;
      border:none;
    }

    .btn.gold{
      background:linear-gradient(135deg,var(--green),var(--gold));
      color:#fff;
      border:none;
    }

    .btn.danger{
      background:rgba(180,35,24,.1);
      color:var(--danger);
      border:1px solid rgba(180,35,24,.18);
    }

    .list{
      display:grid;
      gap:16px;
    }

    .item{
      border:1px solid rgba(11,31,58,.10);
      border-radius:18px;
      padding:18px;
      background:rgba(255,255,255,.95);
    }

    .item-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .row-title{
      font-size:19px;
      font-weight:900;
      line-height:1.2;
    }

    .meta{
      display:grid;
      gap:6px;
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .status-pending_review{background:rgba(201,162,39,.15); color:#8A6A00;}
    .status-awaiting_recipient{background:rgba(11,31,58,.10); color:var(--navy);}
    .status-confirmed{background:rgba(11,93,59,.15); color:var(--green);}
    .status-declined{background:rgba(180,35,24,.12); color:var(--danger);}
    .status-rescheduled{background:rgba(11,31,58,.10); color:var(--navy);}
    .status-completed{background:rgba(11,93,59,.15); color:var(--green);}

    .editor-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
      margin-top:14px;
    }

    @media (max-width: 820px){
      .editor-grid{grid-template-columns:1fr;}
    }

    label{
      display:block;
      font-weight:800;
      margin-bottom:6px;
      font-size:14px;
    }

    input, select, textarea{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid var(--line);
      font:inherit;
      background:#fff;
      outline:none;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .empty{
      padding:16px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:#fff;
    }

    .mini-note{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Organiser Panel</h1>
      <p id="userStatus" class="muted">Checking organiser access...</p>

      <div class="actions">
        <a class="btn" href="./dashboard.html">Dashboard</a>
        <a class="btn" href="./my-meetings.html">My Meetings</a>
        <button class="btn gold" id="refreshOrganiserBtn" type="button">Refresh Requests</button>
      </div>
    </section>
<section class="section-card">
    <h2>Participant Approval</h2>
    <p class="muted">Approve registered users for portal access and directory visibility.</p>
    <div id="participantApprovalList" class="list"></div>
  </section>

  <section class="section-card">
    <h2>Request Filters</h2>

    <div class="actions" style="margin-top:0;">
      <select id="statusFilter" style="min-width:220px;">
        <option value="">All statuses</option>
        <option value="pending_review">Pending Review</option>
        <option value="awaiting_recipient">Awaiting Recipient</option>
        <option value="confirmed">Confirmed</option>
        <option value="declined">Declined</option>
        <option value="rescheduled">Rescheduled</option>
        <option value="completed">Completed</option>
      </select>

      <select id="meetingTypeFilter" style="min-width:220px;">
        <option value="">All meeting types</option>
        <option value="B2B">B2B</option>
        <option value="B2G">B2G</option>
        <option value="G2G">G2G</option>
      </select>

      <input
        type="text"
        id="requestSearch"
        placeholder="Search requester, target, organisation..."
        style="min-width:260px;"
      />
    </div>
  </section>
    
    <section class="section-card">
      <h2>Meeting Requests</h2>
      <p class="muted">Review requests, update statuses, and create confirmed meetings.</p>
      <div id="organiserRequestsList" class="list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./portal.js"></script>
 <script>
  document.addEventListener("DOMContentLoaded", async () => {
    await ensureSignedIn();
    await ensureOrganiserAccess();
    await loadPendingParticipants();
    await loadOrganiserRequests();

    document.getElementById("refreshOrganiserBtn").addEventListener("click", async () => {
      await loadPendingParticipants();
      await loadOrganiserRequests();
    });

    document.getElementById("statusFilter").addEventListener("change", loadOrganiserRequests);
    document.getElementById("meetingTypeFilter").addEventListener("change", loadOrganiserRequests);
    document.getElementById("requestSearch").addEventListener("input", loadOrganiserRequests);
  });
</script>
</body>
</html>
