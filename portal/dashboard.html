<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Portal | Dashboard</title>
  <style>
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      margin:0;
      background:#F7F8FA;
      color:#0B1F3A;
    }
    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:24px;
    }
    .card{
      background:#fff;
      border:1px solid rgba(11,31,58,.12);
      border-radius:18px;
      padding:20px;
      box-shadow:0 12px 28px rgba(11,31,58,.1);
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .btn{
      display:inline-flex;
      padding:12px 14px;
      border-radius:14px;
      text-decoration:none;
      border:1px solid rgba(11,31,58,.12);
      background:#fff;
      color:#0B1F3A;
      font-weight:800;
      cursor:pointer;
    }
    .btn.primary{
      background:linear-gradient(135deg,#0B5D3B,#0B1F3A);
      color:#fff;
      border:none;
    }
    .muted{color:#5E6A7A}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AfSNET Portal Dashboard</h1>
      <p id="userStatus" class="muted">Checking session...</p>

      <div class="actions">
        <a class="btn primary" href="./directory.html">Participant Directory</a>
        <a class="btn" href="./my-meetings.html">My Meetings</a>
        <a class="btn" href="./organiser.html">Organiser Panel</a>
        <button class="btn" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="./portal.js?v=2"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await ensureSignedIn();
      document.getElementById("logoutBtn").addEventListener("click", logoutUser);
    });
  </script>
</body>
</html>
