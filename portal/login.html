<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Meetings Portal | Login</title>
  <style>
    :root{
      --navy:#0B1F3A;
      --green:#0B5D3B;
      --gold:#C9A227;
      --bg:#F7F8FA;
      --card:#FFFFFF;
      --line:rgba(11,31,58,.12);
      --muted:#5E6A7A;
      --shadow:0 12px 28px rgba(11,31,58,.10);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      background:
        radial-gradient(900px 600px at 10% -10%, rgba(201,162,39,.14), transparent 55%),
        radial-gradient(900px 600px at 100% 0%, rgba(11,93,59,.14), transparent 45%),
        var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--navy);
    }

    .card{
      width:min(520px, 100%);
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:26px;
    }

    .kicker{
      display:inline-flex;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(201,162,39,.12);
      border:1px solid rgba(201,162,39,.35);
      font-size:12px;
      font-weight:850;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.15;
    }

    p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.55;
    }

    input{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid var(--line);
      font:inherit;
      margin-bottom:14px;
      outline:none;
    }

    input:focus{
      border-color:rgba(11,93,59,.55);
      box-shadow:0 0 0 4px rgba(11,93,59,.14);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:13px 16px;
      border-radius:14px;
      border:1px solid var(--line);
      text-decoration:none;
      font-weight:850;
      cursor:pointer;
      background:#fff;
      color:var(--navy);
      flex:1;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--green),var(--navy));
      color:#fff;
      border:none;
    }

    .note{
      margin-top:14px;
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="kicker">Private Access</div>
    <h1>AfSNET Meetings Portal</h1>
    <p>
      Sign in with your approved event email to access the participant directory,
      submit meeting requests, and view confirmed meetings.
    </p>

    <input type="email" id="email" placeholder="Enter your approved email address" />

    <div class="actions">
      <button class="btn primary" type="button" onclick="login()">Send Magic Link</button>
      <a class="btn" href="../index.html">Back to Website</a>
    </div>

    <div class="note">
      Access is available only to approved participants and organisers.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./portal.js"></script>
</body>
</html>
