<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Portal | Login</title>
  <style>
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#F7F8FA;
    }
    .card{
      width:min(480px, calc(100% - 32px));
      background:#fff;
      border:1px solid rgba(11,31,58,.12);
      border-radius:18px;
      padding:24px;
      box-shadow:0 12px 28px rgba(11,31,58,.1);
    }
    h1{margin-top:0;color:#0B1F3A}
    p{color:#5E6A7A}
    input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(11,31,58,.12);
      margin:12px 0;
      font:inherit;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#0B5D3B,#0B1F3A);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AfSNET Meeting Portal</h1>
    <p>Sign in with your approved event email to access the private participant directory and meeting requests.</p>
    <input type="email" id="email" placeholder="Enter your email address" />
    <button type="button" onclick="login()">Send Magic Link</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./portal.js"></script>
</body>
</html>
