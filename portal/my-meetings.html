<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Meetings Portal | My Meetings</title>
  <style>
    :root{
      --navy:#0B1F3A;
      --green:#0B5D3B;
      --gold:#C9A227;
      --bg:#F7F8FA;
      --card:#FFFFFF;
      --line:rgba(11,31,58,.12);
      --muted:#5E6A7A;
      --shadow:0 12px 28px rgba(11,31,58,.10);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--navy);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px;
      margin-bottom:18px;
    }

    h1,h2,h3{margin-top:0}
    .muted{color:var(--muted)}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      text-decoration:none;
      font-weight:850;
      background:#fff;
      color:var(--navy);
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--green),var(--navy));
      color:#fff;
      border:none;
    }

    .section-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:20px;
      margin-bottom:16px;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .item{
      border:1px solid rgba(11,31,58,.10);
      border-radius:16px;
      padding:16px;
      background:rgba(255,255,255,.92);
    }

    .row-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:8px;
    }

    .meta{
      display:grid;
      gap:6px;
      color:var(--muted);
      font-size:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:850;
      margin-right:8px;
      margin-bottom:8px;
      border:1px solid rgba(201,162,39,.35);
      background:rgba(201,162,39,.12);
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    .status-pending_review{background:rgba(201,162,39,.15); color:#8A6A00;}
    .status-awaiting_recipient{background:rgba(11,31,58,.10); color:var(--navy);}
    .status-confirmed{background:rgba(11,93,59,.15); color:var(--green);}
    .status-declined{background:rgba(180,35,24,.12); color:#B42318;}
    .status-rescheduled{background:rgba(11,31,58,.10); color:var(--navy);}
    .status-completed{background:rgba(11,93,59,.15); color:var(--green);}

    .empty{
      padding:16px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:#fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>My Meetings</h1>
      <p id="userStatus" class="muted">Checking session...</p>

      <div class="actions">
        <a class="btn" href="./dashboard.html">Dashboard</a>
        <a class="btn" href="./directory.html">Participant Directory</a>
        <button class="btn primary" id="refreshMeetingsBtn" type="button">Refresh</button>
      </div>
    </section>

    <section class="section-card">
      <h2>Requests Sent</h2>
      <div id="sentRequestsList" class="list"></div>
    </section>

    <section class="section-card">
      <h2>Requests Received</h2>
      <div id="receivedRequestsList" class="list"></div>
    </section>

    <section class="section-card">
      <h2>Confirmed Meetings</h2>
      <div id="confirmedMeetingsList" class="list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./portal.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await ensureSignedIn();
      await loadMyMeetings();

      document.getElementById("refreshMeetingsBtn").addEventListener("click", loadMyMeetings);
    });
  </script>
</body>
</html>
