<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfSNET Portal | My Meetings</title>
  <style>
    :root{
      --navy:#0B1F3A;
      --green:#0B5D3B;
      --gold:#C9A227;
      --bg:#F7F8FA;
      --card:#FFFFFF;
      --line:rgba(11,31,58,.12);
      --muted:#5E6A7A;
      --shadow:0 12px 28px rgba(11,31,58,.10);
      --radius:18px;
      --danger:#B42318;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--navy);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .topbar h1{
      margin:0;
      font-size:30px;
    }

    .muted{color:var(--muted)}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--navy);
      text-decoration:none;
      font-weight:800;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--green),var(--navy));
      color:#fff;
      border:none;
    }

    .section{
      margin-top:22px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .section-head h2{
      margin:0;
      font-size:22px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid rgba(201,162,39,.35);
      background:rgba(201,162,39,.12);
      color:var(--navy);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:16px;
    }

    @media (max-width: 900px){
      .cards{grid-template-columns:1fr;}
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      display:grid;
      gap:10px;
    }

    .name{
      font-size:20px;
      font-weight:900;
      color:var(--navy);
      line-height:1.2;
    }

    .org{
      color:var(--green);
      font-weight:800;
    }

    .meta{
      display:grid;
      gap:6px;
      color:var(--muted);
      font-size:14px;
    }

    .reason{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(11,93,59,.05);
      border:1px solid rgba(11,93,59,.12);
      color:var(--navy);
      line-height:1.55;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      width:fit-content;
    }

    .badge.pending_review,
    .badge.awaiting_recipient{
      background:rgba(201,162,39,.15);
      border:1px solid rgba(201,162,39,.35);
      color:var(--navy);
    }

    .badge.confirmed,
    .badge.completed{
      background:rgba(11,93,59,.12);
      border:1px solid rgba(11,93,59,.28);
      color:var(--green);
    }

    .badge.declined{
      background:rgba(180,35,24,.10);
      border:1px solid rgba(180,35,24,.22);
      color:var(--danger);
    }

    .badge.rescheduled{
      background:rgba(11,31,58,.08);
      border:1px solid rgba(11,31,58,.18);
      color:var(--navy);
    }

    .empty{
      background:#fff;
      border:1px dashed var(--line);
      border-radius:18px;
      padding:18px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>My Meetings</h1>
        <p class="muted" id="userStatus">Loading session...</p>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn" href="./dashboard.html">Dashboard</a>
        <a class="btn" href="./directory.html">Participant Directory</a>
        <button class="btn" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2>Requests I Sent</h2>
        <span class="status-pill" id="sentCount">0</span>
      </div>
      <div id="sentRequests" class="cards"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Requests I Received</h2>
        <span class="status-pill" id="receivedCount">0</span>
      </div>
      <div id="receivedRequests" class="cards"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Confirmed Meetings</h2>
        <span class="status-pill" id="confirmedCount">0</span>
      </div>
      <div id="confirmedMeetings" class="cards"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./portal.js?v=3"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await ensureSignedIn();
      await loadMyMeetings();
      document.getElementById("logoutBtn").addEventListener("click", logoutUser);
    });
  </script>
</body>
</html>
